<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Confirmed — Pinaki Alarm</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d0d;
    color: #f0f0f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 22px;
    padding: 40px 32px;
    max-width: 380px;
    width: 100%;
    text-align: center;
  }
  .check {
    font-size: 56px;
    margin-bottom: 16px;
  }
  h1 {
    font-size: 22px;
    color: #56ccf2;
    margin-bottom: 10px;
  }
  p {
    font-size: 15px;
    color: #aaa;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .btn {
    display: block;
    background: #2f80ed;
    color: #fff;
    text-decoration: none;
    padding: 14px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 12px;
  }
  .note {
    font-size: 12px;
    color: #666;
    margin: 0;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="check">✅</div>
    <h1>Email Confirmed</h1>
    <p>Your Pinaki account is ready. Open the app and log in to start making a difference.</p>
    <a class="btn" href="pinakialarmapp://">Open Pinaki Alarm</a>
    <p class="note">If the button doesn't open the app, just open Pinaki Alarm from your home screen and log in.</p>
  </div>
</body>
</html>
